services:
  postgres:
    image: postgres:16-alpine
    container_name: galagate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: galagate
      POSTGRES_PASSWORD: galagate
      POSTGRES_DB: galagate
    ports:
      - "5433:5432"
    volumes:
      - galagate_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U galagate -d galagate"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  galagate_postgres_data:
